server:
  port: 8080
  mode: debug
  read_timeout: 30
  write_timeout: 30
  idle_timeout: 60

database:
  driver: mysql
  host: localhost
  port: 3306
  username: root
  password: root
  database: enterprise_dev
  max_open_conns: 10
  max_idle_conns: 5
  conn_max_lifetime: 3600

redis:
  host: localhost
  port: 6379
  password: ""
  db: 1
  pool_size: 5
  min_idle_conns: 2

log:
  level: debug
  format: text
  output: stdout
  max_size: 10
  max_backups: 1
  max_age: 1
  compress: false

jwt:
  secret: "dev-jwt-secret-key"
  expire_time: 86400
  issuer: "go-enterprise-template-dev"

metrics:
  enabled: true
  path: "/metrics"
  port: 9090

tracing:
  enabled: false
  service_name: "go-enterprise-service-dev"
  endpoint: "http://localhost:14268/api/traces"
  sample_rate: 1.0