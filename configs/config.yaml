server:
  port: 8080
  mode: release
  read_timeout: 30
  write_timeout: 30
  idle_timeout: 60

database:
  driver: mysql
  host: localhost
  port: 3306
  username: root
  password: password
  database: enterprise_db
  max_open_conns: 100
  max_idle_conns: 10
  conn_max_lifetime: 3600

redis:
  host: localhost
  port: 6379
  password: ""
  db: 0
  pool_size: 10
  min_idle_conns: 5

log:
  level: info
  format: json
  output: stdout
  max_size: 100
  max_backups: 3
  max_age: 7
  compress: true

jwt:
  secret: "your-super-secret-jwt-key-change-this-in-production"
  expire_time: 7200
  issuer: "go-enterprise-template"

metrics:
  enabled: true
  path: "/metrics"
  port: 9090

tracing:
  enabled: true
  service_name: "go-enterprise-service"
  endpoint: "http://localhost:14268/api/traces"
  sample_rate: 0.1